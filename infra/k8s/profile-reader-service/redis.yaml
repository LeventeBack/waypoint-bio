apiVersion: v1
kind: Service
metadata:
  name: redis-reader
  namespace: waypoint
spec:
  selector:
    app: redis-reader
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-reader
  namespace: waypoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-reader
  template:
    metadata:
      labels:
        app: redis-reader
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
