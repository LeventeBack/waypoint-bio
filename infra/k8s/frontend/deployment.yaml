apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: waypoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: europe-west1-docker.pkg.dev/waypoint-bio-project/waypoint/frontend:latest
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: NODE_ENV
              value: "production"
            # No TLS yet (HTTP via nip.io) - the session cookie can't be Secure
            - name: SESSION_COOKIE_SECURE
              value: "false"
          envFrom:
            - configMapRef: { name: waypoint-shared-config }
          readinessProbe:
            tcpSocket: { port: 3005 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3005 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
