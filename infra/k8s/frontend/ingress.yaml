# Public ingress for the web app + public profile pages.
# nip.io maps <anything>.34.52.151.85.nip.io -> 34.52.151.85 (the static IP)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waypoint-frontend
  namespace: waypoint
spec:
  ingressClassName: traefik
  rules:
    - host: app.34.52.151.85.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3005
