apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: waypoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      initContainers:
        - name: wait-mongo
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mongo-analytics 27017; do echo waiting-for-mongo; sleep 2; done",
            ]
      containers:
        - name: analytics-service
          image: europe-west1-docker.pkg.dev/waypoint-bio-project/waypoint/analytics-service:latest
          ports:
            - containerPort: 3030
          env:
            - name: PORT
              value: "3030"
          envFrom:
            - secretRef: { name: waypoint-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 3030 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3030 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 384Mi }
