apiVersion: v1
kind: Service
metadata:
  name: mongo-analytics
  namespace: waypoint
spec:
  clusterIP: None
  selector:
    app: mongo-analytics
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-analytics
  namespace: waypoint
spec:
  serviceName: mongo-analytics
  replicas: 1
  selector:
    matchLabels:
      app: mongo-analytics
  template:
    metadata:
      labels:
        app: mongo-analytics
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  { name: waypoint-secrets, key: MONGO_INITDB_ROOT_USERNAME }
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  { name: waypoint-secrets, key: MONGO_INITDB_ROOT_PASSWORD }
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  { name: waypoint-secrets, key: MONGO_INITDB_DATABASE }
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 15
            # mongosh is a Node CLI with a slow cold start
            timeoutSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: 500m, memory: 512Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
