# Public ingress for the profile-service API (auth, profiles, links).
# nip.io maps <anything>.34.52.151.85.nip.io -> 34.52.151.85 (the static IP).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waypoint-api
  namespace: waypoint
spec:
  ingressClassName: traefik
  rules:
    - host: api.34.52.151.85.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: profile-service
                port:
                  number: 3010
