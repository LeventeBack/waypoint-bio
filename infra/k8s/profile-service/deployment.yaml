apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-service
  namespace: waypoint
spec:
  replicas: 1
  selector:
    matchLabels:
      app: profile-service
  template:
    metadata:
      labels:
        app: profile-service
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z postgres-profile 5432; do echo waiting-for-postgres; sleep 2; done",
            ]
      containers:
        - name: profile-service
          image: europe-west1-docker.pkg.dev/waypoint-bio-project/waypoint/profile-service:latest
          ports:
            - containerPort: 3010
          env:
            - name: PORT
              value: "3010"
            - name: JWT_EXPIRES_IN
              value: "7d"
            - name: GCS_BUCKET
              value: "waypoint-bio-images"
            - name: GCS_KEY_FILE
              value: "/etc/gcs/key.json"
          envFrom:
            - configMapRef: { name: waypoint-shared-config }
            - secretRef: { name: waypoint-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 3010 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3010 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 192Mi }
            limits: { cpu: 500m, memory: 384Mi }
          volumeMounts:
            - name: gcs-key
              mountPath: /etc/gcs
              readOnly: true
      volumes:
        - name: gcs-key
          secret:
            secretName: waypoint-storage-key
