# Runs `prisma migrate deploy` against Postgres using the dedicated `migrator` image
apiVersion: batch/v1
kind: Job
metadata:
  name: profile-migrate
  namespace: waypoint
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600 # auto-clean 10 min after success
  template:
    metadata:
      labels:
        app: profile-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z postgres-profile 5432; do echo waiting-for-postgres; sleep 2; done",
            ]
      containers:
        - name: migrate
          image: europe-west1-docker.pkg.dev/waypoint-bio-project/waypoint/profile-service-migrate:latest
          envFrom:
            - secretRef: { name: waypoint-secrets }
