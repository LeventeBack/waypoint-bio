services:
  postgres-profile:
    image: postgres:16-alpine
    container_name: postgres-profile
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROFILE_DB_NAME}
      POSTGRES_USER: ${PROFILE_DB_USER}
      POSTGRES_PASSWORD: ${PROFILE_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-profile-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${PROFILE_DB_USER} -d ${PROFILE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
      target: dev
    container_name: profile-service
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npx nest start --watch"
    ports:
      - "3010:3010"
    environment:
      PORT: 3010
      PROFILE_DB_URL: postgresql://${PROFILE_DB_USER}:${PROFILE_DB_PASSWORD}@postgres-profile:5432/${PROFILE_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PROFILE_READER_SERVICE_URL: ${PROFILE_READER_SERVICE_URL}
      GCS_BUCKET: waypoint-bio-images
      GCS_KEY_FILE: /etc/gcs/key.json
      NODE_ENV: development
    depends_on:
      postgres-profile:
        condition: service_healthy
    volumes:
      - ./services/profile-service:/app # hot-reload: mounts source over image
      - /app/node_modules # keep container node_modules intact
      - /app/src/generated # keep generated Prisma client intact
      - ./secrets/waypoint-storage-key.json:/etc/gcs/key.json:ro # GCS uploader key
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3010/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis-reader:
    image: redis:7-alpine
    container_name: redis-reader
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  profile-reader-service:
    build:
      context: ./services/profile-reader-service
      dockerfile: Dockerfile
    container_name: profile-reader-service
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      PORT: 3020
      REDIS_URL: ${REDIS_URL}
      PROFILE_SERVICE_URL: ${PROFILE_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
    depends_on:
      redis-reader:
        condition: service_healthy
      profile-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3020/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-analytics:
    image: mongo:7
    container_name: mongo-analytics
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${ANALYTICS_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${ANALYTICS_DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${ANALYTICS_DB_NAME}
    ports:
      - "27017:27017"
    volumes:
      - mongo-analytics-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
      target: dev
    container_name: analytics-service
    restart: unless-stopped
    command: sh -c "rm -f tsconfig.build.tsbuildinfo && npx nest start --watch"
    ports:
      - "3030:3030"
    environment:
      PORT: 3030
      ANALYTICS_DB_URL: mongodb://${ANALYTICS_DB_USER}:${ANALYTICS_DB_PASSWORD}@mongo-analytics:27017/${ANALYTICS_DB_NAME}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: development
    depends_on:
      mongo-analytics:
        condition: service_healthy
    volumes:
      - ./services/analytics-service:/app # hot-reload: mounts source over image
      - /app/node_modules # keep container node_modules intact
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3030/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: dev
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PROFILE_SERVICE_URL: ${PROFILE_SERVICE_URL}
      PROFILE_READER_SERVICE_URL: ${PROFILE_READER_SERVICE_URL}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL}
      NODE_ENV: development
    depends_on:
      profile-service:
        condition: service_healthy
      profile-reader-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    volumes:
      - ./services/frontend:/app # hot-reload: mounts source over image
      - /app/node_modules # keep container node_modules intact
      - /app/.next # keep build cache out of the host mount

volumes:
  postgres-profile-data:
  mongo-analytics-data:
