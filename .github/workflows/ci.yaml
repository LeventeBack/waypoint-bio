name: CI

on:
  pull_request:
    branches: [main]

jobs:
  node:
    name: lint + build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [profile-service, analytics-service, frontend]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        if: matrix.service == 'profile-service'
        run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  go:
    name: lint + build (profile-reader-service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/profile-reader-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/profile-reader-service/go.sum
      - run: go build ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/profile-reader-service

  docker:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [profile-service, profile-reader-service, analytics-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          target: runtime
          push: false
