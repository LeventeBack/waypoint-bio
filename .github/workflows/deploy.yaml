name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: europe-west1-docker.pkg.dev
  PROJECT: waypoint-bio-project
  NAMESPACE: waypoint

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY" --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push images (tagged :<sha> and :latest)
        run: bash infra/build-push.sh "$GITHUB_SHA"

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply shared config
        run: kubectl apply -f infra/k8s/configmap.yaml

      - name: Run database migrations
        run: |
          kubectl delete job profile-migrate -n "$NAMESPACE" --ignore-not-found
          sed "s|profile-service-migrate:latest|profile-service-migrate:${GITHUB_SHA}|" \
            infra/k8s/profile-service/migrate-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/profile-migrate -n "$NAMESPACE" --timeout=180s

      - name: Roll out new images
        run: |
          REG="$REGISTRY/$PROJECT/waypoint"
          for svc in profile-service profile-reader-service analytics-service frontend; do
            kubectl -n "$NAMESPACE" set image "deployment/$svc" "$svc=$REG/$svc:$GITHUB_SHA"
          done

      - name: Wait for rollouts
        run: |
          for svc in profile-service profile-reader-service analytics-service frontend; do
            kubectl -n "$NAMESPACE" rollout status "deployment/$svc" --timeout=180s
          done
