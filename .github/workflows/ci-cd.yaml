name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: lint + build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [profile-service, analytics-service, frontend]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        if: matrix.service == 'profile-service'
        run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  go:
    name: lint + build (profile-reader-service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/profile-reader-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/profile-reader-service/go.sum
      - run: go build ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/profile-reader-service

  docker:
    name: docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [profile-service, profile-reader-service, analytics-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          target: runtime
          push: false

  deploy:
    name: deploy to k3s
    needs: [node, go, docker] # only deploy if every CI job passed
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    env:
      REGISTRY: europe-west1-docker.pkg.dev
      PROJECT: waypoint-bio-project
      NAMESPACE: waypoint
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY" --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push images (tagged :<sha> and :latest)
        run: bash infra/build-push.sh "$GITHUB_SHA"

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Apply shared config
        run: kubectl apply -f infra/k8s/configmap.yaml

      - name: Run database migrations
        run: |
          kubectl delete job profile-migrate -n "$NAMESPACE" --ignore-not-found
          sed "s|profile-service-migrate:latest|profile-service-migrate:${GITHUB_SHA}|" \
            infra/k8s/profile-service/migrate-job.yaml | kubectl apply -f -
          kubectl wait --for=condition=complete job/profile-migrate -n "$NAMESPACE" --timeout=180s

      - name: Roll out new images
        run: |
          REG="$REGISTRY/$PROJECT/waypoint"
          for svc in profile-service profile-reader-service analytics-service frontend; do
            kubectl -n "$NAMESPACE" set image "deployment/$svc" "$svc=$REG/$svc:$GITHUB_SHA"
          done

      - name: Wait for rollouts
        run: |
          for svc in profile-service profile-reader-service analytics-service frontend; do
            kubectl -n "$NAMESPACE" rollout status "deployment/$svc" --timeout=180s
          done
